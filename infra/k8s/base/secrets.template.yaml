# Copy to secrets.yaml and replace values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: work-boots-secrets
type: Opaque
stringData:
  # Required for production deploys; should override ConfigMap placeholder URL.
  DATABASE_URL: "postgresql+psycopg://<user>:<password>@<host>:5432/<database>"
  API_TOKEN_HASH_PEPPER: "replace-with-long-random-secret"
  APP_SESSION_SECRET: "replace-with-long-random-secret"
  GOOGLE_OIDC_CLIENT_ID: "replace-with-google-client-id"
  GOOGLE_OIDC_CLIENT_SECRET: "replace-with-google-client-secret"
  GOOGLE_OAUTH_CLIENT_ID: "replace-with-google-client-id"
  GOOGLE_OAUTH_CLIENT_SECRET: "replace-with-google-client-secret"
  GOOGLE_PLACES_API_KEY: ""
  SEARCH_CONSOLE_CREDENTIALS_JSON: ""
  # Include active key version and any legacy versions needed only for decryption.
  GOOGLE_OAUTH_TOKEN_ENCRYPTION_KEYS_JSON: '{"v1":"replace-with-long-random-secret"}'
  GOOGLE_OAUTH_TOKEN_ENCRYPTION_SECRET: "replace-with-long-random-secret"
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM_NUMBER: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM_ADDRESS: ""
  SMTP_USE_TLS: "true"
