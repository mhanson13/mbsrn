# Copy to secrets.yaml and replace values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: work-boots-secrets
  namespace: work-boots
type: Opaque
stringData:
  API_TOKEN_HASH_PEPPER: "replace-with-long-random-secret"
  APP_SESSION_SECRET: "replace-with-long-random-secret"
  GOOGLE_OIDC_CLIENT_ID: "replace-with-google-client-id"
  GOOGLE_OIDC_CLIENT_SECRET: "replace-with-google-client-secret"
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_FROM_NUMBER: ""
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM_ADDRESS: ""
  SMTP_USE_TLS: "true"
