apiVersion: apps/v1
kind: Deployment
metadata:
  name: mbsrn-api
  namespace: mbsrn
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Keep rollout capacity deterministic under node pressure by replacing
      # one pod at a time instead of requiring surge capacity.
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: mbsrn-api
  template:
    metadata:
      labels:
        app: mbsrn-api
    spec:
      serviceAccountName: mbsrn-api
      containers:
        - name: mbsrn-api
          image: __API_IMAGE__
          ports:
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: production
            - name: DB_CONNECTION_MODE
              value: cloudsql_proxy
            - name: SESSION_STATE_BACKEND
              value: redis
            - name: SESSION_STATE_ALLOW_INMEMORY_FALLBACK
              value: "false"
            - name: REDIS_URL
              value: redis://mbsrn-redis:6379/0
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: GCP_PROJECT_ID
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: DATABASE_URL
            - name: GOOGLE_AUTH_ENABLED
              value: "true"
            - name: GOOGLE_OIDC_CLIENT_ID
              value: __GOOGLE_OIDC_CLIENT_ID__
            - name: GOOGLE_OAUTH_CLIENT_ID
              value: __GOOGLE_OAUTH_CLIENT_ID__
            - name: GOOGLE_BUSINESS_PROFILE_REDIRECT_URI
              value: __GOOGLE_BUSINESS_PROFILE_REDIRECT_URI__
            - name: APP_SESSION_ISSUER
              value: mbsrn-console
            - name: APP_SESSION_AUDIENCE
              value: mbsrn-api
            - name: APP_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: APP_SESSION_SECRET
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: GOOGLE_OAUTH_CLIENT_SECRET
            - name: AI_PROVIDER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: AI_PROVIDER_API_KEY
            - name: GOOGLE_PLACES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: GOOGLE_PLACES_API_KEY
                  optional: true
            - name: SEARCH_CONSOLE_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: SEARCH_CONSOLE_CREDENTIALS_JSON
                  optional: true
            - name: AI_PROVIDER_NAME
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: AI_PROVIDER_NAME
            - name: AI_MODEL_NAME
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: AI_MODEL_NAME
            - name: AI_TIMEOUT_VALUE
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: AI_TIMEOUT_VALUE
          resources:
            requests:
              cpu: __API_CPU_REQUEST__
              memory: __API_MEMORY_REQUEST__
              ephemeral-storage: __API_EPHEMERAL_STORAGE_REQUEST__
            limits:
              cpu: __API_CPU_LIMIT__
              memory: __API_MEMORY_LIMIT__
              ephemeral-storage: __API_EPHEMERAL_STORAGE_LIMIT__
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            # App startup can include bounded DB/proxy readiness retries.
            # Allow a conservative warm-up window before readiness/liveness.
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 0
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--structured-logs"
            - "--port=5432"
            - "$(CLOUD_SQL_INSTANCE_CONNECTION_NAME)"
          env:
            - name: CLOUD_SQL_INSTANCE_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: mbsrn-api-auth
                  key: CLOUD_SQL_INSTANCE_CONNECTION_NAME
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "512Mi"
