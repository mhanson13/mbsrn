name: frontend-ci

on:
  pull_request:
    paths:
      - "frontend/operator-ui/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "frontend/operator-ui/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/operator-ui/package.json"

      - name: Install dependencies
        working-directory: frontend/operator-ui
        run: npm install

      - name: Run lint
        working-directory: frontend/operator-ui
        run: npm run lint --if-present

      - name: Build UI
        working-directory: frontend/operator-ui
        run: npm run build

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push UI image (Cloud Buildpacks)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE_URI="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/ui:${GITHUB_SHA}"
          gcloud builds submit --project="${PROJECT_ID}" --pack image="${IMAGE_URI}" frontend/operator-ui
          echo "UI_IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
