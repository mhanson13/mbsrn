name: deploy-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      db_alignment_mode:
        description: "Database alignment mode for legacy untracked schema"
        required: false
        default: normal
        type: choice
        options:
          - normal
          - baseline_existing

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
  AR_REGION: ${{ vars.AR_REGION }}
  AR_REPOSITORY: ${{ vars.AR_REPOSITORY }}
  UI_IMAGE_NAME: ${{ vars.UI_IMAGE_NAME }}
  API_IMAGE_NAME: ${{ vars.API_IMAGE_NAME }}
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
  NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
  GOOGLE_OIDC_CLIENT_ID: ${{ vars.GOOGLE_OIDC_CLIENT_ID }}
  GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
  GOOGLE_BUSINESS_PROFILE_REDIRECT_URI: ${{ vars.GOOGLE_BUSINESS_PROFILE_REDIRECT_URI }}
  APP_SESSION_ISSUER: mbsrn-console
  APP_SESSION_AUDIENCE: mbsrn-api
  AI_PROVIDER_NAME: ${{ vars.AI_PROVIDER_NAME || 'openai' }}
  AI_MODEL_NAME: ${{ vars.AI_MODEL_NAME || 'gpt-4o-mini' }}
  AI_TIMEOUT_VALUE: ${{ vars.AI_TIMEOUT_VALUE || '30' }}
  UI_CPU_REQUEST: ${{ vars.UI_CPU_REQUEST }}
  UI_MEMORY_REQUEST: ${{ vars.UI_MEMORY_REQUEST }}
  UI_EPHEMERAL_STORAGE_REQUEST: ${{ vars.UI_EPHEMERAL_STORAGE_REQUEST }}
  UI_CPU_LIMIT: ${{ vars.UI_CPU_LIMIT }}
  UI_MEMORY_LIMIT: ${{ vars.UI_MEMORY_LIMIT }}
  UI_EPHEMERAL_STORAGE_LIMIT: ${{ vars.UI_EPHEMERAL_STORAGE_LIMIT }}
  API_CPU_REQUEST: ${{ vars.API_CPU_REQUEST }}
  API_MEMORY_REQUEST: ${{ vars.API_MEMORY_REQUEST }}
  API_EPHEMERAL_STORAGE_REQUEST: ${{ vars.API_EPHEMERAL_STORAGE_REQUEST }}
  API_CPU_LIMIT: ${{ vars.API_CPU_LIMIT }}
  API_MEMORY_LIMIT: ${{ vars.API_MEMORY_LIMIT }}
  API_EPHEMERAL_STORAGE_LIMIT: ${{ vars.API_EPHEMERAL_STORAGE_LIMIT }}
  DEPLOY_CPU_REQUEST: ${{ vars.DEPLOY_CPU_REQUEST }}
  DEPLOY_CPU_LIMIT: ${{ vars.DEPLOY_CPU_LIMIT }}
  DEPLOY_MEMORY_REQUEST: ${{ vars.DEPLOY_MEMORY_REQUEST }}
  DEPLOY_MEMORY_LIMIT: ${{ vars.DEPLOY_MEMORY_LIMIT }}
  DEPLOY_EPHEMERAL_STORAGE_REQUEST: ${{ vars.DEPLOY_EPHEMERAL_STORAGE_REQUEST }}
  DEPLOY_EPHEMERAL_STORAGE_LIMIT: ${{ vars.DEPLOY_EPHEMERAL_STORAGE_LIMIT }}
  DEPLOY_PROXY_CPU_REQUEST: ${{ vars.DEPLOY_PROXY_CPU_REQUEST }}
  DEPLOY_PROXY_CPU_LIMIT: ${{ vars.DEPLOY_PROXY_CPU_LIMIT }}
  DEPLOY_PROXY_MEMORY_REQUEST: ${{ vars.DEPLOY_PROXY_MEMORY_REQUEST }}
  DEPLOY_PROXY_MEMORY_LIMIT: ${{ vars.DEPLOY_PROXY_MEMORY_LIMIT }}
  DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST: ${{ vars.DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST }}
  DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT: ${{ vars.DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT }}
  DB_ALIGNMENT_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.db_alignment_mode || 'normal' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required inputs
        shell: bash
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AI_PROVIDER_API_KEY: ${{ secrets.AI_PROVIDER_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          set -euo pipefail

          required=(
            GCP_PROJECT_ID
            GCP_REGION
            GKE_CLUSTER
            K8S_NAMESPACE
            AR_REGION
            AR_REPOSITORY
            UI_IMAGE_NAME
            API_IMAGE_NAME
            NEXT_PUBLIC_GOOGLE_CLIENT_ID
            NEXT_PUBLIC_API_BASE_URL
            GOOGLE_OIDC_CLIENT_ID
            GOOGLE_OAUTH_CLIENT_ID
            GOOGLE_BUSINESS_PROFILE_REDIRECT_URI
            APP_SESSION_ISSUER
            APP_SESSION_AUDIENCE
            UI_CPU_REQUEST
            UI_MEMORY_REQUEST
            UI_EPHEMERAL_STORAGE_REQUEST
            UI_CPU_LIMIT
            UI_MEMORY_LIMIT
            UI_EPHEMERAL_STORAGE_LIMIT
            API_CPU_REQUEST
            API_MEMORY_REQUEST
            API_EPHEMERAL_STORAGE_REQUEST
            API_CPU_LIMIT
            API_MEMORY_LIMIT
            API_EPHEMERAL_STORAGE_LIMIT
            DEPLOY_CPU_REQUEST
            DEPLOY_CPU_LIMIT
            DEPLOY_MEMORY_REQUEST
            DEPLOY_MEMORY_LIMIT
            DEPLOY_EPHEMERAL_STORAGE_REQUEST
            DEPLOY_EPHEMERAL_STORAGE_LIMIT
            DEPLOY_PROXY_CPU_REQUEST
            DEPLOY_PROXY_CPU_LIMIT
            DEPLOY_PROXY_MEMORY_REQUEST
            DEPLOY_PROXY_MEMORY_LIMIT
            DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST
            DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
            CLOUD_SQL_INSTANCE_CONNECTION_NAME
            DATABASE_URL
            APP_SESSION_SECRET
            GOOGLE_OAUTH_CLIENT_SECRET
            AI_PROVIDER_API_KEY
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required input: ${name}" >&2
              exit 1
            fi
          done

          if [[ -z "${AI_PROVIDER_NAME:-}" ]]; then
            echo "AI_PROVIDER_NAME must not be empty." >&2
            exit 1
          fi

          if [[ -z "${AI_MODEL_NAME:-}" ]]; then
            echo "AI_MODEL_NAME must not be empty." >&2
            exit 1
          fi

          if ! [[ "${AI_TIMEOUT_VALUE}" =~ ^[0-9]+$ ]] || [[ "${AI_TIMEOUT_VALUE}" -lt 1 ]]; then
            echo "AI_TIMEOUT_VALUE must be a positive integer." >&2
            exit 1
          fi

          python - <<'PY'
          import os
          import sys
          from urllib.parse import urlparse

          database_url = (os.environ.get("DATABASE_URL") or "").strip()
          parsed = urlparse(database_url)
          host = (parsed.hostname or "").strip().lower()

          if not parsed.scheme or not host:
              print("DATABASE_URL must be a valid absolute URL for production deploy.", file=sys.stderr)
              raise SystemExit(1)

          if host in {"localhost", "127.0.0.1", "::1"}:
              print(
                  "Invalid production DATABASE_URL: localhost/loopback is not allowed for deploy-prod.",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY

          if ! grep -qx "migrate: python -m alembic upgrade head" Procfile; then
            echo "Procfile migrate process must be 'python -m alembic upgrade head'" >&2
            exit 1
          fi

          if ! grep -qx "migrate-baseline-existing: python -m alembic stamp --purge 0024_google_business_profile_oauth_connections" Procfile; then
            echo "Procfile baseline process must stamp --purge 0024_google_business_profile_oauth_connections" >&2
            exit 1
          fi

          if [[ "${DB_ALIGNMENT_MODE}" != "normal" && "${DB_ALIGNMENT_MODE}" != "baseline_existing" ]]; then
            echo "Invalid DB_ALIGNMENT_MODE: ${DB_ALIGNMENT_MODE}" >&2
            exit 1
          fi

          files=(
            frontend/operator-ui/Dockerfile
            k8s/namespace.yaml
            k8s/ui-serviceaccount.yaml
            k8s/api-serviceaccount.yaml
            k8s/redis-deployment.yaml
            k8s/redis-service.yaml
            k8s/ui-deployment.yaml
            k8s/ui-service.yaml
            k8s/api-deployment.yaml
            k8s/api-service.yaml
            k8s/api-migration-job.yaml
            k8s/api-migration-baseline-job.yaml
            k8s/api-seo-competitor-profile-retention-cronjob.yaml
          )

          for path in "${files[@]}"; do
            if [[ ! -f "${path}" ]]; then
              echo "Missing required manifest: ${path}" >&2
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify GKE cluster exists
        shell: bash
        run: |
          set -euo pipefail
          gcloud container clusters describe "${GKE_CLUSTER}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(name)' > /dev/null

      - name: Configure Docker auth for Artifact Registry
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${AR_REGION}-docker.pkg.dev" --quiet

      - name: Build and push images
        shell: bash
        env:
          GCS_LOGS_BUCKET: ${{ vars.GCS_LOGS_BUCKET }}
        run: |
          set -euo pipefail

          UI_IMAGE="${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/${UI_IMAGE_NAME}:${GITHUB_SHA}"
          API_IMAGE="${AR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPOSITORY}/${API_IMAGE_NAME}:${GITHUB_SHA}"
          UI_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL:-/api}"

          if [[ -z "${API_IMAGE}" ]]; then
            echo "API_IMAGE resolved empty; refusing to continue." >&2
            exit 1
          fi

          echo "UI_IMAGE=${UI_IMAGE}" >> "${GITHUB_ENV}"
          echo "API_IMAGE=${API_IMAGE}" >> "${GITHUB_ENV}"
          echo "Using API image for migration and deploy: ${API_IMAGE}"

          gcloud builds submit \
            --project "${GCP_PROJECT_ID}" \
            --gcs-source-staging-dir "gs://mbsrn-build-source/source" \
            --gcs-log-dir "${GCS_LOGS_BUCKET}" \
            --pack image="${API_IMAGE}" \
            .

          docker build \
            --file frontend/operator-ui/Dockerfile \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${NEXT_PUBLIC_GOOGLE_CLIENT_ID}" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${UI_API_BASE_URL}" \
            --tag "${UI_IMAGE}" \
            frontend/operator-ui

          docker push "${UI_IMAGE}"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Render manifests to temporary files
        shell: bash
        run: |
          set -euo pipefail

          render_dir="${RUNNER_TEMP}/rendered-${GITHUB_SHA}"
          rm -rf "${render_dir}"
          mkdir -p "${render_dir}"

          if [[ -z "${API_IMAGE:-}" ]]; then
            echo "API_IMAGE is not set in render step." >&2
            exit 1
          fi

          echo "Rendering manifests with API_IMAGE=${API_IMAGE}"

          cp k8s/namespace.yaml "${render_dir}/namespace.yaml"
          cp k8s/ui-serviceaccount.yaml "${render_dir}/ui-serviceaccount.yaml"
          cp k8s/api-serviceaccount.yaml "${render_dir}/api-serviceaccount.yaml"
          cp k8s/redis-deployment.yaml "${render_dir}/redis-deployment.yaml"
          cp k8s/redis-service.yaml "${render_dir}/redis-service.yaml"
          cp k8s/ui-service.yaml "${render_dir}/ui-service.yaml"
          cp k8s/api-service.yaml "${render_dir}/api-service.yaml"

          grep -q "__UI_IMAGE__" k8s/ui-deployment.yaml
          grep -q "__UI_CPU_REQUEST__" k8s/ui-deployment.yaml
          grep -q "__UI_MEMORY_REQUEST__" k8s/ui-deployment.yaml
          grep -q "__UI_EPHEMERAL_STORAGE_REQUEST__" k8s/ui-deployment.yaml
          grep -q "__UI_CPU_LIMIT__" k8s/ui-deployment.yaml
          grep -q "__UI_MEMORY_LIMIT__" k8s/ui-deployment.yaml
          grep -q "__UI_EPHEMERAL_STORAGE_LIMIT__" k8s/ui-deployment.yaml
          grep -q "__API_IMAGE__" k8s/api-deployment.yaml
          grep -q "__API_CPU_REQUEST__" k8s/api-deployment.yaml
          grep -q "__API_MEMORY_REQUEST__" k8s/api-deployment.yaml
          grep -q "__API_EPHEMERAL_STORAGE_REQUEST__" k8s/api-deployment.yaml
          grep -q "__API_CPU_LIMIT__" k8s/api-deployment.yaml
          grep -q "__API_MEMORY_LIMIT__" k8s/api-deployment.yaml
          grep -q "__API_EPHEMERAL_STORAGE_LIMIT__" k8s/api-deployment.yaml
          grep -q "__GOOGLE_OIDC_CLIENT_ID__" k8s/api-deployment.yaml
          grep -q "__GOOGLE_OAUTH_CLIENT_ID__" k8s/api-deployment.yaml
          grep -q "__GOOGLE_BUSINESS_PROFILE_REDIRECT_URI__" k8s/api-deployment.yaml
          grep -q "__API_IMAGE__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_CPU_REQUEST__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_MEMORY_REQUEST__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_EPHEMERAL_STORAGE_REQUEST__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_CPU_LIMIT__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_MEMORY_LIMIT__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_EPHEMERAL_STORAGE_LIMIT__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_PROXY_CPU_REQUEST__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_PROXY_MEMORY_REQUEST__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_PROXY_CPU_LIMIT__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_PROXY_MEMORY_LIMIT__" k8s/api-migration-job.yaml
          grep -q "__DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT__" k8s/api-migration-job.yaml
          grep -q "__API_IMAGE__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_CPU_REQUEST__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_MEMORY_REQUEST__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_EPHEMERAL_STORAGE_REQUEST__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_CPU_LIMIT__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_MEMORY_LIMIT__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_EPHEMERAL_STORAGE_LIMIT__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_PROXY_CPU_REQUEST__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_PROXY_MEMORY_REQUEST__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_PROXY_CPU_LIMIT__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_PROXY_MEMORY_LIMIT__" k8s/api-migration-baseline-job.yaml
          grep -q "__DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT__" k8s/api-migration-baseline-job.yaml
          grep -q "__API_IMAGE__" k8s/api-seo-competitor-profile-retention-cronjob.yaml

          sed \
            -e "s|__UI_IMAGE__|${UI_IMAGE}|g" \
            -e "s|__UI_CPU_REQUEST__|${UI_CPU_REQUEST}|g" \
            -e "s|__UI_MEMORY_REQUEST__|${UI_MEMORY_REQUEST}|g" \
            -e "s|__UI_EPHEMERAL_STORAGE_REQUEST__|${UI_EPHEMERAL_STORAGE_REQUEST}|g" \
            -e "s|__UI_CPU_LIMIT__|${UI_CPU_LIMIT}|g" \
            -e "s|__UI_MEMORY_LIMIT__|${UI_MEMORY_LIMIT}|g" \
            -e "s|__UI_EPHEMERAL_STORAGE_LIMIT__|${UI_EPHEMERAL_STORAGE_LIMIT}|g" \
            k8s/ui-deployment.yaml > "${render_dir}/ui-deployment.yaml"
          sed \
            -e "s|__API_IMAGE__|${API_IMAGE}|g" \
            -e "s|__API_CPU_REQUEST__|${API_CPU_REQUEST}|g" \
            -e "s|__API_MEMORY_REQUEST__|${API_MEMORY_REQUEST}|g" \
            -e "s|__API_EPHEMERAL_STORAGE_REQUEST__|${API_EPHEMERAL_STORAGE_REQUEST}|g" \
            -e "s|__API_CPU_LIMIT__|${API_CPU_LIMIT}|g" \
            -e "s|__API_MEMORY_LIMIT__|${API_MEMORY_LIMIT}|g" \
            -e "s|__API_EPHEMERAL_STORAGE_LIMIT__|${API_EPHEMERAL_STORAGE_LIMIT}|g" \
            -e "s|__GOOGLE_OIDC_CLIENT_ID__|${GOOGLE_OIDC_CLIENT_ID}|g" \
            -e "s|__GOOGLE_OAUTH_CLIENT_ID__|${GOOGLE_OAUTH_CLIENT_ID}|g" \
            -e "s|__GOOGLE_BUSINESS_PROFILE_REDIRECT_URI__|${GOOGLE_BUSINESS_PROFILE_REDIRECT_URI}|g" \
            k8s/api-deployment.yaml > "${render_dir}/api-deployment.yaml"
          sed \
            -e "s|__API_IMAGE__|${API_IMAGE}|g" \
            -e "s|__DEPLOY_CPU_REQUEST__|${DEPLOY_CPU_REQUEST}|g" \
            -e "s|__DEPLOY_MEMORY_REQUEST__|${DEPLOY_MEMORY_REQUEST}|g" \
            -e "s|__DEPLOY_EPHEMERAL_STORAGE_REQUEST__|${DEPLOY_EPHEMERAL_STORAGE_REQUEST}|g" \
            -e "s|__DEPLOY_CPU_LIMIT__|${DEPLOY_CPU_LIMIT}|g" \
            -e "s|__DEPLOY_MEMORY_LIMIT__|${DEPLOY_MEMORY_LIMIT}|g" \
            -e "s|__DEPLOY_EPHEMERAL_STORAGE_LIMIT__|${DEPLOY_EPHEMERAL_STORAGE_LIMIT}|g" \
            -e "s|__DEPLOY_PROXY_CPU_REQUEST__|${DEPLOY_PROXY_CPU_REQUEST}|g" \
            -e "s|__DEPLOY_PROXY_MEMORY_REQUEST__|${DEPLOY_PROXY_MEMORY_REQUEST}|g" \
            -e "s|__DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST__|${DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST}|g" \
            -e "s|__DEPLOY_PROXY_CPU_LIMIT__|${DEPLOY_PROXY_CPU_LIMIT}|g" \
            -e "s|__DEPLOY_PROXY_MEMORY_LIMIT__|${DEPLOY_PROXY_MEMORY_LIMIT}|g" \
            -e "s|__DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT__|${DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT}|g" \
            k8s/api-migration-job.yaml > "${render_dir}/api-migration-job.yaml"
          sed \
            -e "s|__API_IMAGE__|${API_IMAGE}|g" \
            -e "s|__DEPLOY_CPU_REQUEST__|${DEPLOY_CPU_REQUEST}|g" \
            -e "s|__DEPLOY_MEMORY_REQUEST__|${DEPLOY_MEMORY_REQUEST}|g" \
            -e "s|__DEPLOY_EPHEMERAL_STORAGE_REQUEST__|${DEPLOY_EPHEMERAL_STORAGE_REQUEST}|g" \
            -e "s|__DEPLOY_CPU_LIMIT__|${DEPLOY_CPU_LIMIT}|g" \
            -e "s|__DEPLOY_MEMORY_LIMIT__|${DEPLOY_MEMORY_LIMIT}|g" \
            -e "s|__DEPLOY_EPHEMERAL_STORAGE_LIMIT__|${DEPLOY_EPHEMERAL_STORAGE_LIMIT}|g" \
            -e "s|__DEPLOY_PROXY_CPU_REQUEST__|${DEPLOY_PROXY_CPU_REQUEST}|g" \
            -e "s|__DEPLOY_PROXY_MEMORY_REQUEST__|${DEPLOY_PROXY_MEMORY_REQUEST}|g" \
            -e "s|__DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST__|${DEPLOY_PROXY_EPHEMERAL_STORAGE_REQUEST}|g" \
            -e "s|__DEPLOY_PROXY_CPU_LIMIT__|${DEPLOY_PROXY_CPU_LIMIT}|g" \
            -e "s|__DEPLOY_PROXY_MEMORY_LIMIT__|${DEPLOY_PROXY_MEMORY_LIMIT}|g" \
            -e "s|__DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT__|${DEPLOY_PROXY_EPHEMERAL_STORAGE_LIMIT}|g" \
            k8s/api-migration-baseline-job.yaml > "${render_dir}/api-migration-baseline-job.yaml"
          sed \
            -e "s|__API_IMAGE__|${API_IMAGE}|g" \
            k8s/api-seo-competitor-profile-retention-cronjob.yaml > "${render_dir}/api-seo-competitor-profile-retention-cronjob.yaml"

          for rendered in \
            "${render_dir}/ui-deployment.yaml" \
            "${render_dir}/api-deployment.yaml" \
            "${render_dir}/api-migration-job.yaml" \
            "${render_dir}/api-migration-baseline-job.yaml" \
            "${render_dir}/api-seo-competitor-profile-retention-cronjob.yaml"
          do
            if grep -q "__[A-Z0-9_][A-Z0-9_]*__" "${rendered}"; then
              echo "Unresolved placeholder detected in rendered manifest: ${rendered}" >&2
              exit 1
            fi
          done

          for rendered_api in \
            "${render_dir}/api-deployment.yaml" \
            "${render_dir}/api-migration-job.yaml" \
            "${render_dir}/api-migration-baseline-job.yaml" \
            "${render_dir}/api-seo-competitor-profile-retention-cronjob.yaml"
          do
            if ! grep -Fq "image: ${API_IMAGE}" "${rendered_api}"; then
              echo "Rendered manifest does not use expected API image ${API_IMAGE}: ${rendered_api}" >&2
              exit 1
            fi
          done

          python scripts/validate_k8s_env_sources.py \
            "${render_dir}/api-deployment.yaml" \
            "${render_dir}/api-migration-job.yaml" \
            "${render_dir}/api-migration-baseline-job.yaml" \
            "${render_dir}/api-seo-competitor-profile-retention-cronjob.yaml"

          database_env_block="$(awk '
            $0 ~ /name: DATABASE_URL/ {capture=1; next}
            capture && $0 ~ /^[[:space:]]*- name:/ {capture=0}
            capture {print}
          ' "${render_dir}/api-deployment.yaml")"

          if [[ -z "${database_env_block}" ]]; then
            echo "Rendered API deployment is missing DATABASE_URL env wiring." >&2
            exit 1
          fi

          if ! grep -Eq "^[[:space:]]*valueFrom:[[:space:]]*$" <<<"${database_env_block}"; then
            echo "Rendered API deployment DATABASE_URL must use valueFrom." >&2
            exit 1
          fi

          if ! grep -Eq "^[[:space:]]*secretKeyRef:[[:space:]]*$" <<<"${database_env_block}"; then
            echo "Rendered API deployment DATABASE_URL must use secretKeyRef." >&2
            exit 1
          fi

          if ! grep -Eq "^[[:space:]]*name:[[:space:]]*mbsrn-api-auth[[:space:]]*$" <<<"${database_env_block}"; then
            echo "Rendered API deployment DATABASE_URL secret ref must target mbsrn-api-auth." >&2
            exit 1
          fi

          if ! grep -Eq "^[[:space:]]*key:[[:space:]]*DATABASE_URL[[:space:]]*$" <<<"${database_env_block}"; then
            echo "Rendered API deployment DATABASE_URL secret ref must target key DATABASE_URL." >&2
            exit 1
          fi

          if grep -Eq "^[[:space:]]*value:[[:space:]]*" <<<"${database_env_block}"; then
            echo "Rendered API deployment DATABASE_URL must not use a literal value." >&2
            exit 1
          fi

          if grep -Eiq "(localhost|127\\.0\\.0\\.1|::1)" <<<"${database_env_block}"; then
            echo "Rendered API deployment DATABASE_URL wiring must not include localhost literals." >&2
            exit 1
          fi

          echo "RENDER_DIR=${render_dir}" >> "${GITHUB_ENV}"

      - name: Apply workload manifests
        shell: bash
        env:
          CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_SESSION_SECRET: ${{ secrets.APP_SESSION_SECRET }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          AI_PROVIDER_API_KEY: ${{ secrets.AI_PROVIDER_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${API_IMAGE:-}" ]]; then
            echo "API_IMAGE is not set in apply step." >&2
            exit 1
          fi

          echo "DB alignment mode: ${DB_ALIGNMENT_MODE}"
          echo "Applying migration and rollout with API image: ${API_IMAGE}"

          kubectl apply -f "${RENDER_DIR}/namespace.yaml"
          kubectl -n "${K8S_NAMESPACE}" create secret generic mbsrn-api-auth \
            --from-literal=CLOUD_SQL_INSTANCE_CONNECTION_NAME="${CLOUD_SQL_INSTANCE_CONNECTION_NAME}" \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=APP_SESSION_SECRET="${APP_SESSION_SECRET}" \
            --from-literal=GOOGLE_OAUTH_CLIENT_SECRET="${GOOGLE_OAUTH_CLIENT_SECRET}" \
            --from-literal=GCP_PROJECT_ID="${GCP_PROJECT_ID}" \
            --from-literal=AI_PROVIDER_API_KEY="${AI_PROVIDER_API_KEY}" \
            --from-literal=GOOGLE_PLACES_API_KEY="${GOOGLE_PLACES_API_KEY}" \
            --from-literal=AI_PROVIDER_NAME="${AI_PROVIDER_NAME}" \
            --from-literal=AI_MODEL_NAME="${AI_MODEL_NAME}" \
            --from-literal=AI_TIMEOUT_VALUE="${AI_TIMEOUT_VALUE}" \
            --dry-run=client -o yaml | kubectl apply -f -

          database_url_key_present="$(kubectl -n "${K8S_NAMESPACE}" get secret mbsrn-api-auth -o jsonpath='{.data.DATABASE_URL}' 2>/dev/null || true)"
          if [[ -z "${database_url_key_present}" ]]; then
            echo "Kubernetes secret wiring check failed: mbsrn-api-auth key DATABASE_URL is missing." >&2
            exit 1
          fi

          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/ui-serviceaccount.yaml"
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/api-serviceaccount.yaml"
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/redis-service.yaml"
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/redis-deployment.yaml"

          if [[ "${DB_ALIGNMENT_MODE}" == "baseline_existing" ]]; then
            kubectl delete job mbsrn-api-migrate-baseline -n "${K8S_NAMESPACE}" --ignore-not-found=true
            kubectl wait --for=delete job/mbsrn-api-migrate-baseline -n "${K8S_NAMESPACE}" --timeout=120s || true
            kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/api-migration-baseline-job.yaml"
            if ! kubectl wait --for=condition=complete job/mbsrn-api-migrate-baseline -n "${K8S_NAMESPACE}" --timeout=600s; then
              kubectl logs -n "${K8S_NAMESPACE}" job/mbsrn-api-migrate-baseline -c align --tail=200 || true
              kubectl logs -n "${K8S_NAMESPACE}" job/mbsrn-api-migrate-baseline -c cloud-sql-proxy --tail=200 || true
              kubectl describe -n "${K8S_NAMESPACE}" job mbsrn-api-migrate-baseline || true
              exit 1
            fi
          fi

          kubectl delete job mbsrn-api-migrate -n "${K8S_NAMESPACE}" --ignore-not-found=true
          kubectl wait --for=delete job/mbsrn-api-migrate -n "${K8S_NAMESPACE}" --timeout=120s || true
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/api-migration-job.yaml"
          if ! kubectl wait --for=condition=complete job/mbsrn-api-migrate -n "${K8S_NAMESPACE}" --timeout=600s; then
            kubectl logs -n "${K8S_NAMESPACE}" job/mbsrn-api-migrate -c migrate --tail=200 || true
            kubectl logs -n "${K8S_NAMESPACE}" job/mbsrn-api-migrate -c cloud-sql-proxy --tail=200 || true
            kubectl describe -n "${K8S_NAMESPACE}" job mbsrn-api-migrate || true
            exit 1
          fi

          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/ui-deployment.yaml"
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/ui-service.yaml"
          kubectl delete deployment mbsrn-api -n "${K8S_NAMESPACE}" --ignore-not-found=true
          kubectl wait --for=delete deployment/mbsrn-api -n "${K8S_NAMESPACE}" --timeout=120s || true
          kubectl apply --dry-run=server -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/api-deployment.yaml"
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/api-deployment.yaml"
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/api-service.yaml"
          kubectl apply -n "${K8S_NAMESPACE}" -f "${RENDER_DIR}/api-seo-competitor-profile-retention-cronjob.yaml"
          kubectl rollout restart deployment/mbsrn-api --namespace "${K8S_NAMESPACE}"

      - name: Wait for rollouts
        shell: bash
        run: |
          set -euo pipefail

          print_api_env_wiring_diagnostics() {
            echo "::group::mbsrn-api env wiring diagnostics"
            deployment_json="${RUNNER_TEMP}/mbsrn-api-deployment.json"
            if kubectl get deployment mbsrn-api --namespace "${K8S_NAMESPACE}" -o json > "${deployment_json}" 2>/dev/null; then
              python - "${deployment_json}" <<'PY'
              import json
              import sys

              with open(sys.argv[1], encoding="utf-8") as handle:
                  payload = json.load(handle)

              containers = payload.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [])
              container = next((item for item in containers if item.get("name") == "mbsrn-api"), None)
              if container is None:
                  print("mbsrn-api container not found in deployment template.")
                  raise SystemExit(0)

              env_entries = container.get("env", [])
              print("mbsrn-api env sources:")
              for entry in env_entries:
                  name = entry.get("name", "<unnamed>")
                  if "valueFrom" in entry:
                      value_from = entry["valueFrom"]
                      if "secretKeyRef" in value_from:
                          ref = value_from["secretKeyRef"]
                          print(f"- {name}: secretKeyRef name={ref.get('name')} key={ref.get('key')}")
                      elif "configMapKeyRef" in value_from:
                          ref = value_from["configMapKeyRef"]
                          print(f"- {name}: configMapKeyRef name={ref.get('name')} key={ref.get('key')}")
                      else:
                          print(f"- {name}: valueFrom(other)")
                  elif "value" in entry:
                      print(f"- {name}: literal value")
                  else:
                      print(f"- {name}: source not set")

              database_url_entry = next((item for item in env_entries if item.get("name") == "DATABASE_URL"), None)
              if database_url_entry is None:
                  print("DATABASE_URL env entry: missing")
              elif "valueFrom" in database_url_entry and "secretKeyRef" in database_url_entry["valueFrom"]:
                  ref = database_url_entry["valueFrom"]["secretKeyRef"]
                  print(
                      "DATABASE_URL env entry: secretKeyRef "
                      f"name={ref.get('name')} key={ref.get('key')}"
                  )
              elif "value" in database_url_entry:
                  print("DATABASE_URL env entry: literal value")
              else:
                  print("DATABASE_URL env entry: unresolved source")
              PY
            else
              echo "Unable to fetch deployment/mbsrn-api for env wiring diagnostics."
            fi

            database_url_key_present="$(kubectl -n "${K8S_NAMESPACE}" get secret mbsrn-api-auth -o jsonpath='{.data.DATABASE_URL}' 2>/dev/null || true)"
            if [[ -n "${database_url_key_present}" ]]; then
              echo "Secret wiring check: mbsrn-api-auth key DATABASE_URL is present."
            else
              echo "Secret wiring check: mbsrn-api-auth key DATABASE_URL is missing."
            fi
            echo "::endgroup::"
          }

          kubectl rollout status deployment/mbsrn-ui --namespace "${K8S_NAMESPACE}" --timeout=300s
          if ! kubectl rollout status deployment/mbsrn-api --namespace "${K8S_NAMESPACE}" --timeout=300s; then
            print_api_env_wiring_diagnostics
            kubectl describe deployment mbsrn-api --namespace "${K8S_NAMESPACE}" || true
            kubectl get pods --namespace "${K8S_NAMESPACE}" -l app=mbsrn-api -o wide || true
            kubectl logs deployment/mbsrn-api --namespace "${K8S_NAMESPACE}" --tail=200 || true
            exit 1
          fi
