name: backend-ci

on:
  pull_request:
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest
