name: backend-ci

on:
  pull_request:
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: work_boots_console_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d work_boots_console_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: ci
      ENVIRONMENT: ci
      DB_AUTO_CREATE_LOCAL: "false"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/work_boots_console_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Validate Alembic migration chain
        run: |
          alembic upgrade head

      - name: Run tests
        run: pytest
