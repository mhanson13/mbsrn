name: backend-ci

on:
  pull_request:
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "alembic/**"
      - "requirements*.txt"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push API image (Cloud Buildpacks)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GAR_LOCATION: ${{ secrets.GAR_LOCATION }}
          GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
        run: |
          IMAGE_URI="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${GAR_REPOSITORY}/api:${GITHUB_SHA}"
          gcloud builds submit --project="${PROJECT_ID}" --pack image="${IMAGE_URI}" .
          echo "API_IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
